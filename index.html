<!-- SUBSTITUA A TAG <script> PRINCIPAL (a de baixo, com toda a lógica da UI) POR ISTO -->
<script>
    const canvas = document.getElementById('ai-aura-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, particles = [], mouseX = 0, mouseY = 0, isProcessing = false;

    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
    resize();

    class Particle {
        constructor() {
            this.x = Math.random() * width; this.y = Math.random() * height;
            this.size = Math.random() * 1.5 + 0.5; this.speedX = Math.random() * 1 - 0.5; this.speedY = Math.random() * 1 - 0.5;
            this.color = Math.random() > 0.5 ? '#FF7E05' : '#ffc6a5';
        }
        update() {
            if (isProcessing) {
                const dx = this.x - width/2, dy = this.y - height/2, angle = Math.atan2(dy, dx) + 0.08, dist = Math.sqrt(dx*dx + dy*dy) * 0.97;
                this.x = width/2 + Math.cos(angle) * dist; this.y = height/2 + Math.sin(angle) * dist;
            } else {
                this.x += this.speedX + (mouseX - width/2) * 0.002; this.y += this.speedY + (mouseY - height/2) * 0.002;
            }
            if (this.x < 0) this.x = width; if (this.x > width) this.x = 0; if (this.y < 0) this.y = height; if (this.y > height) this.y = 0;
        }
        draw() { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
    }

    for(let i=0; i<150; i++) particles.push(new Particle());

    function animateBg() {
        ctx.fillStyle = 'rgba(8, 6, 5, 0.2)'; ctx.fillRect(0, 0, width, height);
        const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, isProcessing ? 400 : 200);
        grad.addColorStop(0, isProcessing ? 'rgba(255, 126, 5, 0.25)' : 'rgba(255, 126, 5, 0.05)');
        grad.addColorStop(1, 'transparent'); ctx.fillStyle = grad; ctx.fillRect(0,0,width,height);
        particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateBg);
    }
    animateBg();

    let synthHover, synthClick, noiseProcess, audioInit = false;

    async function initAudio() {
        if(audioInit) return;
        await Tone.start();
        synthHover = new Tone.Synth({ oscillator: { type: "sine" }, envelope: { attack: 0.1, release: 0.1 } }).toDestination(); synthHover.volume.value = -25;
        synthClick = new Tone.MembraneSynth().toDestination(); synthClick.volume.value = -10;
        const filter = new Tone.AutoFilter(4).start();
        noiseProcess = new Tone.NoiseSynth({ noise: { type: 'pink' }, envelope: { attack: 1, sustain: 1, release: 1 } }).connect(filter).toDestination();
        noiseProcess.volume.value = -30;
        audioInit = true;
    }

    document.querySelectorAll('.meta-card, button').forEach(btn => {
        btn.addEventListener('mouseenter', () => { if(audioInit && !btn.classList.contains('disabled')) synthHover.triggerAttackRelease("C5", "32n"); });
        btn.addEventListener('mousedown', () => { if(audioInit && !btn.classList.contains('disabled')) { synthClick.triggerAttackRelease("E2", "16n"); if(navigator.vibrate) navigator.vibrate(15); } });
    });

    document.querySelectorAll('.meta-card').forEach(card => {
        card.addEventListener('mousemove', e => {
            const rect = card.getBoundingClientRect();
            card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`); card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
        });
    });

    const synth = window.speechSynthesis;
    let feGilVoice = null, isSpeaking = false;

    function loadVoices() {
        const voices = synth.getVoices();
        feGilVoice = voices.find(v => v.lang === 'pt-BR' && (v.name.includes('Google') || v.name.includes('Luciana'))) || voices.find(v => v.lang === 'pt-BR');
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices(); 

    function animateAvatar() {
        const avatar = document.getElementById('fegil-avatar');
        if(isSpeaking) {
            avatar.style.transform = `scale(${1 + Math.random() * 0.03})`; avatar.style.opacity = `${0.85 + Math.random() * 0.15}`;
            avatar.style.filter = `drop-shadow(0 0 ${20 + Math.random() * 20}px rgba(255,126,5,0.5)) brightness(${1 + Math.random() * 0.15})`;
            requestAnimationFrame(animateAvatar);
        } else {
            avatar.style.transform = 'scale(1)'; avatar.style.opacity = '0.9'; avatar.style.filter = 'drop-shadow(0 0 35px rgba(255,126,5,0.3)) brightness(1)';
        }
    }

    function falar(texto, callback) {
        if(!synth) { if(callback) callback(); return; }
        if (synth.speaking) synth.cancel();
        
        const elStatus = document.getElementById('ai-status-text');
        elStatus.style.opacity = 0;
        setTimeout(() => { elStatus.innerText = `"${texto}"`; elStatus.style.opacity = 1; }, 300);

        const utter = new SpeechSynthesisUtterance(texto);
        if(feGilVoice) utter.voice = feGilVoice;
        utter.pitch = 1.0; utter.rate = 1.1;
        
        utter.onstart = () => { isSpeaking = true; animateAvatar(); };
        utter.onend = () => { isSpeaking = false; if(callback) callback(); };
        utter.onerror = () => { isSpeaking = false; if(callback) callback(); };

        synth.speak(utter);
    }

    const uiStart = document.getElementById('start-screen');
    const uiMain = document.getElementById('main-ui');
    const overlayProcessing = document.getElementById('processing-overlay');
    
    document.getElementById('btn-start').addEventListener('click', async () => {
        await initAudio();
        falar("Conexão estabelecida. Plataforma FeGil iniciada.");
        uiStart.classList.add('opacity-0');
        setTimeout(() => {
            uiStart.classList.add('hidden');
            uiMain.classList.remove('opacity-0', 'pointer-events-none');
        }, 700);
    });

    const inputUpload = document.getElementById('upload-video');
    const cardUpload = document.getElementById('card-upload');
    let uploadedVideoFile = null;
    let uploadedVideoUrl = null;
    let duracaoVideo = 0; // segundos, populado no loadedmetadata
    let segmentosGerados = []; // resultado real do corte

    inputUpload.addEventListener('change', (e) => {
        if(e.target.files.length === 0) return;
        const file = e.target.files[0];

        if(!file.type.startsWith('video/')) {
            falar("Formato inválido. Por favor, envie um arquivo de vídeo.");
            return;
        }

        // evita vazamento de memória se o usuário trocar o arquivo
        if(uploadedVideoUrl) URL.revokeObjectURL(uploadedVideoUrl);

        uploadedVideoFile = file;
        document.getElementById('txt-upload-title').innerText = file.name;
        document.getElementById('txt-upload-desc').innerText = "Mídia carregada com sucesso.";
        cardUpload.style.borderColor = '#FF7E05';
        
        uploadedVideoUrl = URL.createObjectURL(file);
        const videoPlayer = document.getElementById('main-video-player');
        const placeholder = document.getElementById('placeholder-video');
        
        videoPlayer.src = uploadedVideoUrl;
        videoPlayer.onloadedmetadata = () => { duracaoVideo = videoPlayer.duration || 0; };
        videoPlayer.classList.remove('hidden'); 
        placeholder.classList.add('hidden');    
        
        document.getElementById('context-container').classList.remove('disabled');
        document.getElementById('input-docs').disabled = false;
        document.getElementById('wrapper-cortes').classList.remove('disabled');
        document.getElementById('btn-cortes').disabled = false;
        document.getElementById('btn-legendas').classList.remove('disabled');
        document.getElementById('btn-legendas').disabled = false;

        falar("Vídeo recebido perfeitamente. Insira o contexto semântico ou escolha a automação desejada.");
    });

    async function executarIA(tipo) {
        // TODO: backend — o campo "Contexto Semântico" (link do Google Docs) hoje
        // não é lido nem enviado a lugar nenhum. Para usá-lo de verdade, essa função
        // precisaria enviar o texto do link + o objetivo do vídeo para uma API (LLM)
        // que decida ONDE cortar, em vez de dividir em partes iguais.

        if(tipo === 'cortes' && !uploadedVideoFile) {
            falar("Nenhum vídeo carregado ainda.");
            return;
        }

        isProcessing = true;
        if(audioInit) noiseProcess.triggerAttack();
        if(navigator.vibrate) navigator.vibrate([20, 100, 20, 100, 20]);

        overlayProcessing.classList.remove('hidden');
        document.getElementById('processing-subtitle').innerText = "A inteligência artificial está analisando e aplicando as edições ao seu vídeo...";
        setTimeout(() => overlayProcessing.classList.remove('opacity-0'), 10);

        const bar = document.getElementById(`bar-${tipo}`);
        bar.style.width = '0%';

        if(tipo === 'cortes') {
            const qtdModulos = Math.max(1, parseInt(document.getElementById('input-modulos').value) || 15);
            falar(`Dividindo vídeo em ${qtdModulos} módulos reais. Isso pode levar alguns minutos no navegador.`);

            try {
                segmentosGerados = await window.cortarVideoReal(
                    uploadedVideoFile,
                    qtdModulos,
                    duracaoVideo || 60,
                    (progress) => {
                        const pct = Math.min(100, Math.round(progress * 100));
                        bar.style.width = pct + '%';
                        document.getElementById('processing-subtitle').innerText =
                            `Cortando com ffmpeg no navegador... ${pct}%`;
                    }
                );
            } catch (err) {
                console.error(err);
                isProcessing = false;
                overlayProcessing.classList.add('opacity-0');
                setTimeout(() => overlayProcessing.classList.add('hidden'), 300);
                falar("Houve um erro ao cortar o vídeo. Verifique o console para detalhes.");
                return;
            }
        } else {
            // Legendas: TODO: backend — geração real de legendas exige transcrição
            // de áudio (ex.: Whisper / Google Speech-to-Text) rodando em servidor.
            // O que roda abaixo é só uma simulação de tempo para não travar a UI.
            falar("Prévia de estilo de legenda gerada. Atenção: a transcrição real ainda depende de integração com um serviço de IA no servidor.");
            await new Promise(res => {
                bar.style.width = '30%';
                setTimeout(() => { bar.style.width = '80%'; setTimeout(res, 1200); }, 800);
            });
        }

        isProcessing = false;
        if(audioInit) { noiseProcess.triggerRelease(); synthClick.triggerAttackRelease("C3", "8n"); }
        bar.style.width = '100%';
        
        overlayProcessing.classList.add('opacity-0');
        setTimeout(() => overlayProcessing.classList.add('hidden'), 300);
        
        falar("Seu projeto está pronto. O estúdio foi liberado.", () => {
            bar.style.width = '0%';
            const btnEditor = document.getElementById('btn-open-editor');
            btnEditor.classList.remove('disabled'); btnEditor.disabled = false;
            btnEditor.classList.add('bg-brand-500/20');
        });
    }

    const workspace = document.getElementById('editor-workspace');
    const subtitleDisplay = document.getElementById('subtitle-display');
    let simInterval;

    function formatarTimecode(segundos) {
        if(!isFinite(segundos) || segundos < 0) segundos = 0;
        const h = Math.floor(segundos / 3600);
        const m = Math.floor((segundos % 3600) / 60);
        const s = Math.floor(segundos % 60);
        const f = Math.floor((segundos % 1) * 60); // pseudo-frames
        const pad = n => String(n).padStart(2, '0');
        return `${pad(h)}:${pad(m)}:${pad(s)}:${pad(f)}`;
    }

    function abrirEditor() {
        workspace.classList.remove('hidden');
        setTimeout(() => workspace.classList.remove('opacity-0'), 50);

        const videoPlayer = document.getElementById('main-video-player');
        const timecodeEl = document.getElementById('timecode');

        // sincroniza o timecode/cabeçote com o vídeo real
        videoPlayer.ontimeupdate = () => {
            timecodeEl.innerText = formatarTimecode(videoPlayer.currentTime);
            const pct = duracaoVideo ? (videoPlayer.currentTime / duracaoVideo) * 100 : 0;
            const playhead = document.getElementById('playhead-line');
            if(playhead) playhead.style.left = pct + '%';
        };

        const qtdModulos = segmentosGerados.length || (parseInt(document.getElementById('input-modulos').value) || 15);
        document.getElementById('btn-export-lote').innerText = `Renderizar Lote (${qtdModulos})`;
        document.getElementById('queue-count').innerText = qtdModulos;

        const queueList = document.getElementById('render-queue-list');
        queueList.innerHTML = '';

        const videoTrack = document.getElementById('timeline-video-track');
        const audioTrack = document.getElementById('timeline-audio-track');
        const subTrack = document.getElementById('timeline-subtitle-track');
        videoTrack.innerHTML = ''; audioTrack.innerHTML = ''; subTrack.innerHTML = '';

        if(segmentosGerados.length > 0) {
            // dados REAIS vindos do corte com ffmpeg
            segmentosGerados.forEach((seg, i) => {
                const num = String(i + 1).padStart(2, '0');
                queueList.innerHTML += `
                    <a href="${seg.url}" download="${seg.name}" class="flex items-center justify-between bg-white/5 hover:bg-white/10 px-2 py-1.5 rounded cursor-pointer group transition-colors">
                        <span class="text-[10px] text-white/70 font-mono group-hover:text-white">${seg.name}</span>
                        <span class="text-[9px] bg-green-500/10 text-green-400 px-1 rounded border border-green-500/20">Pronto</span>
                    </a>`;

                const widthPx = Math.max(24, seg.duration * 4); // escala visual simples
                videoTrack.innerHTML += `<div class="h-full bg-[#183955] border border-[#2a5b82] rounded-sm shrink-0 flex items-center justify-center hover:brightness-125" style="width: ${widthPx}px" title="${formatarTimecode(seg.start)} (+${seg.duration.toFixed(1)}s)"><span class="text-[8px] lg:text-[9px] text-white/70">V_${num}</span></div>`;
                audioTrack.innerHTML += `<div class="h-full bg-[#163a2a] border border-[#235841] rounded-sm shrink-0" style="width: ${widthPx}px"></div>`;
            });
        } else {
            // Nenhum corte real foi executado ainda — placeholder claramente identificado
            for(let i = 1; i <= qtdModulos; i++) {
                const num = i.toString().padStart(2, '0');
                queueList.innerHTML += `
                    <div class="flex items-center justify-between bg-white/5 px-2 py-1.5 rounded opacity-60">
                        <span class="text-[10px] text-white/50 font-mono">Job_${num}.mp4</span>
                        <span class="text-[9px] bg-yellow-500/10 text-yellow-400 px-1 rounded border border-yellow-500/20">Aguardando corte</span>
                    </div>`;
                videoTrack.innerHTML += `<div class="h-full bg-[#183955]/40 border border-dashed border-[#2a5b82] rounded-sm shrink-0 flex items-center justify-center" style="width: 60px"><span class="text-[8px] text-white/40">V_${num}</span></div>`;
                audioTrack.innerHTML += `<div class="h-full bg-[#163a2a]/40 border border-dashed border-[#235841] rounded-sm shrink-0" style="width: 60px"></div>`;
            }
        }

        for(let i = 0; i < 30; i++) {
            const subW = 20 + Math.random() * 30; const margin = Math.random() * 10;
            subTrack.innerHTML += `<div class="h-full bg-[#CC5500] rounded-sm shrink-0 shadow-sm" style="width: ${subW}px; margin-right: ${margin}px;"></div>`;
        }
    }

    function fecharEditor() {
        workspace.classList.add('opacity-0');
        clearInterval(simInterval);
        document.getElementById('play-overlay').classList.remove('hidden');
        subtitleDisplay.classList.add('hidden'); subtitleDisplay.innerHTML = '';
        
        const videoPlayer = document.getElementById('main-video-player');
        if(videoPlayer) { videoPlayer.pause(); videoPlayer.ontimeupdate = null; }

        if(synth.speaking) synth.cancel();
        isSpeaking = false;
        
        setTimeout(() => workspace.classList.add('hidden'), 500);
    }

    function setSubPosition(pos, evt) {
        document.querySelectorAll('.pos-btn').forEach(btn => {
            btn.classList.remove('bg-[#141414]', 'text-brand-500', 'font-bold', 'shadow-md'); btn.classList.add('text-white/60', 'hover:bg-white/5');
        });
        const target = evt ? evt.target : document.querySelector('.pos-btn');
        target.classList.remove('text-white/60', 'hover:bg-white/5');
        target.classList.add('bg-[#141414]', 'text-brand-500', 'font-bold', 'shadow-md');

        subtitleDisplay.style.top = pos === 'top' ? '10%' : pos === 'center' ? '45%' : 'auto';
        subtitleDisplay.style.bottom = pos === 'bottom' ? '12%' : 'auto';
    }

    // Prévia de estilo de legenda (NÃO é transcrição real — ver TODO: backend acima)
    function startSubtitleSimulation() {
        document.getElementById('play-overlay').classList.add('hidden');
        subtitleDisplay.classList.remove('hidden');
        
        const videoPlayer = document.getElementById('main-video-player');
        if(videoPlayer && videoPlayer.src) videoPlayer.play();
        
        const phrases = [
            ["E", "também", "temos", "medo", "que", "você", "trazer"],
            ["este", "assunto", "para", "a", "mesa", "hoje."],
            ["Nosso", "objetivo", "neste", "treinamento"],
            ["é", "garantir", "vendas", "constantes."]
        ];

        let phraseIndex = 0;
        
        function playPhrase() {
            if(phraseIndex >= phrases.length) {
                document.getElementById('play-overlay').classList.remove('hidden');
                subtitleDisplay.classList.add('hidden');
                if(videoPlayer) videoPlayer.pause();
                return;
            }

            const words = phrases[phraseIndex];
            subtitleDisplay.innerHTML = `
                <div class="subtitle-line shadow-[0_0_20px_rgba(204,85,0,0.5)]">
                    ${words.map((w, i) => `<span class="subtitle-word" id="word-${i}">${w}</span>`).join('')}
                </div>`;
            
            let wordIndex = 0;
            simInterval = setInterval(() => {
                document.querySelectorAll('.subtitle-word').forEach(el => el.classList.remove('active'));
                if(wordIndex < words.length) {
                    document.getElementById(`word-${wordIndex}`).classList.add('active'); wordIndex++;
                } else {
                    clearInterval(simInterval); phraseIndex++;
                    if(videoPlayer) videoPlayer.pause();
                    setTimeout(() => { if(videoPlayer) videoPlayer.play(); playPhrase(); }, 500); 
                }
            }, 350); 
        }
        playPhrase();
    }

    // Botão "Renderizar Lote": baixa todos os segmentos reais de uma vez
    document.getElementById('btn-export-lote').addEventListener('click', () => {
        if(segmentosGerados.length === 0) {
            falar("Ainda não há segmentos reais para exportar. Rode a divisão em treinamentos primeiro.");
            return;
        }
        segmentosGerados.forEach((seg, i) => {
            setTimeout(() => {
                const a = document.createElement('a');
                a.href = seg.url; a.download = seg.name;
                document.body.appendChild(a); a.click(); a.remove();
            }, i * 300); // espaça os downloads para o navegador não bloquear
        });
    });
</script>
