<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FeGil - Inteligência Audiovisual e Treinamentos</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔥%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 400: '#ff7332', 500: '#FF7E05', 600: '#ef3b00', 950: '#080605' } }, fontFamily: { sans: ['Inter', 'sans-serif'], figtree: ['Figtree', 'sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #080605; color: #ffffff; overflow-x: hidden; touch-action: manipulation; }
        #ai-aura-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .meta-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; transition: all 0.4s; box-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.5); position: relative; overflow: hidden; }
        .meta-card:not(.disabled):hover { border: 1px solid rgba(255, 126, 5, 0.3); transform: translateY(-3px); }
        .icon-bounce { transition: all 0.4s; }
        .meta-card:not(.disabled):hover .icon-bounce { transform: scale(1.15) translateY(-3px); color: #FF7E05; filter: drop-shadow(0 0 8px rgba(255,126,5,0.6)); }
        .disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        .btn-primary { background: linear-gradient(135deg, #FF7E05 0%, #ef3b00 100%); color: white; box-shadow: 0 4px 15px rgba(255, 126, 5, 0.4); border: none; transition: all 0.3s; cursor: pointer; }
        .btn-primary:hover { box-shadow: 0 8px 30px rgba(255, 126, 5, 0.6); transform: translateY(-3px) scale(1.02); }
        input[type="url"] { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; }
        input[type="url"]:focus { outline: none; border-color: #FF7E05; box-shadow: 0 0 10px rgba(255,126,5,0.2); }
        input.success { border-color: #10B981 !important; box-shadow: 0 0 10px rgba(16, 185, 129, 0.2) !important; }
        .processing-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: #FF7E05; width: 0%; border-radius: 0 0 20px 20px; transition: width 0.5s ease; box-shadow: 0 0 10px #FF7E05; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #toast { position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%); background: #10B981; color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: bold; transition: bottom 0.3s ease; z-index: 999; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-[100dvh]">

    <canvas id="ai-aura-canvas"></canvas>
    <div id="toast">Notificação</div>

    <!-- Overlay de Processamento -->
    <div id="processing-overlay" style="display: none;" class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-md flex-col items-center justify-center transition-opacity duration-500 opacity-0">
        <div class="w-24 h-24 mb-6 relative flex items-center justify-center">
            <div class="absolute inset-0 rounded-full border-t-4 border-brand-500 animate-spin" style="animation-duration: 1.5s;"></div>
            <div class="absolute inset-3 rounded-full border-b-4 border-brand-400 animate-spin" style="animation-duration: 0.8s; animation-direction: reverse;"></div>
            <span id="loading-percentage" class="text-white font-figtree font-black text-xl absolute">0%</span>
        </div>
        <h2 class="text-3xl md:text-4xl font-figtree font-black text-white tracking-widest animate-pulse text-center px-4">MOTOR DE IA ATIVO</h2>
        <p id="processing-subtitle" class="text-brand-400 font-medium mt-4 max-w-md text-center text-sm md:text-lg px-4 transition-all duration-300">Iniciando comunicação com o servidor...</p>
    </div>

    <!-- TELA INICIAL -->
    <div id="start-screen" class="fixed inset-0 flex flex-col items-center justify-center z-50 bg-brand-950/95 backdrop-blur-xl transition-all duration-700 ease-in-out">
        <h1 class="text-7xl md:text-8xl font-figtree font-black tracking-tight mb-4 text-brand-500 drop-shadow-[0_0_15px_rgba(255,126,5,0.8)]">FeGil<span class="text-white">.</span></h1>
        <p class="text-brand-200/60 mb-2 text-center text-sm font-light uppercase tracking-widest">Edição Autônoma e Semântica</p>
        <button id="btn-start" class="btn-primary mt-10 px-12 py-4 rounded-full text-sm font-bold tracking-widest uppercase">Inicializar Sistema</button>
    </div>

    <!-- UI Principal -->
    <main id="main-ui" class="opacity-0 pointer-events-none absolute inset-0 flex flex-col lg:flex-row w-full max-w-7xl mx-auto h-[100dvh] z-10 p-4 md:p-8 gap-8 lg:gap-12 transition-opacity duration-1000 ease-in-out overflow-y-auto lg:overflow-hidden no-scrollbar">
        
        <!-- Coluna da Esquerda (Avatar) -->
        <div class="w-full lg:w-5/12 flex flex-col justify-center relative z-10 pointer-events-none min-h-[50vh] lg:min-h-full">
            <div class="absolute top-0 left-0 pt-2 md:pt-4">
                <h1 class="text-4xl md:text-5xl font-figtree font-black text-brand-500 mb-1">FeGil</h1>
                <div class="flex items-center gap-2">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-brand-500"></span></span>
                    <p class="text-brand-200/70 text-[10px] md:text-xs font-medium tracking-widest uppercase">SISTEMA ONLINE</p>
                </div>
            </div>
            
            <div class="relative w-64 h-64 md:w-96 md:h-96 mt-12 mx-auto flex-shrink-0">
                 <img id="fegil-avatar" src="https://github.com/gilnei-ship-it/fegil/raw/main/fegil.png" alt="FeGil IA" class="w-full h-full object-contain filter drop-shadow-[0_0_35px_rgba(255,126,5,0.3)] transition-all duration-300 opacity-90">
            </div>
            
            <div class="pointer-events-auto mt-[-2rem] md:mt-[-3rem] relative z-20 w-full max-w-md mx-auto">
                <div class="bg-[#0f0b09]/85 backdrop-blur-xl border border-brand-500/20 p-5 rounded-2xl shadow-[0_15px_40px_-10px_rgba(255,126,5,0.2)]">
                    <p id="ai-status-text" class="text-base md:text-lg font-medium text-white/95 leading-snug transition-opacity duration-300 min-h-[3rem]">
                        "Estou pronta. Envie um arquivo ou insira o link da mídia para começarmos."
                    </p>
                </div>
            </div>
        </div>

        <!-- Coluna da Direita (Controles) -->
        <div class="w-full lg:w-7/12 flex flex-col justify-center gap-5 z-10 mt-6 lg:mt-0 pb-16 lg:pb-0 pointer-events-auto">
            
            <!-- NOVO CARTÃO DE UPLOAD HÍBRIDO -->
            <div id="card-upload" class="meta-card p-6 flex flex-col justify-center w-full">
                <div class="flex items-center gap-3 mb-3">
                    <div class="icon-bounce w-10 h-10 rounded-xl bg-brand-500/10 flex items-center justify-center text-brand-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    </div>
                    <div>
                        <h3 class="text-white font-bold text-base">Anexar Mídia</h3>
                        <p class="text-brand-200/50 text-xs">Cole um link ou envie arquivo</p>
                    </div>
                </div>
                
                <input type="url" id="input-link-video" placeholder="Link do Drive ou YouTube..." class="w-full text-sm p-3 rounded-lg transition-colors border border-white/10 mt-2 bg-black/40 text-white">
                
                <div class="flex items-center my-3">
                    <div class="flex-grow border-t border-white/10"></div>
                    <span class="px-3 text-xs text-white/40 font-semibold">OU</span>
                    <div class="flex-grow border-t border-white/10"></div>
                </div>

                <label class="w-full flex flex-col items-center px-4 py-4 bg-black/30 text-brand-400 rounded-lg tracking-wide border-2 border-brand-500/30 border-dashed cursor-pointer hover:bg-brand-500/10 hover:border-brand-500 transition-all shadow-inner">
                    <svg class="w-6 h-6 mb-1 text-white/50" fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M16.88 9.1A4 4 0 0 1 16 17H5a5 5 0 0 1-1-9.9V7a3 3 0 0 1 4.52-2.59A4.98 4.98 0 0 1 17 8c0 .38-.04.74-.12 1.1zM11 11h3l-4-4-4 4h3v3h2v-3z" /></svg>
                    <span id="file-name-display" class="mt-1 text-xs leading-normal font-bold text-white/70">Selecionar arquivo do PC</span>
                    <input type='file' id="input-file-video" accept="video/mp4,video/x-m4v,video/*" class="hidden" />
                </label>
            </div>

            <!-- BOTÃO DE CORTE -->
            <div class="flex flex-col gap-4 mt-2">
                <div id="wrapper-cortes" class="meta-card disabled relative transition-all">
                    <button id="btn-cortes" onclick="executarIA('cortes')" class="w-full p-5 flex items-center text-left bg-transparent border-none cursor-pointer">
                        <div class="icon-bounce w-12 h-12 rounded-xl bg-brand-500/10 flex items-center justify-center mr-4 text-brand-400 flex-shrink-0">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-white font-semibold text-base mb-1">Corte Profissional (Qualidade Máxima)</h3>
                            <p class="text-brand-200/60 text-xs pr-2">Aguarde o processamento completo de áudio e inteligência semântica.</p>
                        </div>
                    </button>
                    <div class="processing-bar" id="bar-cortes"></div>
                </div>
            </div>
            
            <button id="btn-open-editor" disabled onclick="abrirEditor()" class="meta-card disabled mt-4 p-4 bg-brand-600/20 border-brand-500/50 flex justify-center items-center gap-2 hover:bg-brand-500/40 transition-colors cursor-pointer w-full">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="text-white font-bold text-sm tracking-wide">VER RESULTADOS NO ESTÚDIO</span>
            </button>
        </div>
    </main>

    <!-- ESTÚDIO DE VÍDEO -->
    <div id="editor-workspace" class="fixed inset-0 z-50 bg-[#0e0e0e] hidden opacity-0 transition-opacity duration-500 flex flex-col h-[100dvh]">
        <header class="h-12 shrink-0 border-b border-white/5 flex items-center justify-between px-3 md:px-4 bg-[#141414] sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <div class="w-6 h-6 rounded bg-brand-500 flex items-center justify-center"><span class="text-white font-black font-figtree text-xs">F</span></div>
                <span class="text-xs text-white/50 hidden md:block">FeGil Studio</span>
            </div>
            <div class="flex items-center gap-3">
                <span id="modules-detected" class="text-[10px] text-brand-400 bg-brand-500/10 px-2 py-1 rounded border border-brand-500/20 hidden md:block"></span>
                <button class="text-white/60 hover:text-red-500 text-[10px] md:text-xs font-bold px-2 py-1 rounded hover:bg-white/5 transition-colors" onclick="fecharEditor()">SAIR</button>
            </div>
        </header>

        <div class="flex-1 flex flex-col lg:flex-row overflow-y-auto lg:overflow-hidden relative">
            <div class="w-full lg:flex-1 flex flex-col bg-[#111111] border-b lg:border-b-0 lg:border-r border-white/5 p-2 md:p-4 min-h-min shrink-0">
                
                <!-- PLAYER DE VÍDEO -->
                <div class="w-full aspect-video bg-black relative rounded-lg overflow-hidden border border-white/10 flex items-center justify-center shadow-lg">
                    <img id="placeholder-video" src="https://placehold.co/1920x1080/111/333?text=SELECIONE+UM+VÍDEO+DA+LISTA" class="absolute inset-0 w-full h-full object-cover opacity-50">
                    
                    <video id="main-video-player" class="w-full h-full object-contain hidden" playsinline></video>
                    
                    <div class="absolute inset-0 flex items-center justify-center z-20 transition-opacity pointer-events-none" id="play-overlay">
                        <div class="w-16 h-16 rounded-full bg-brand-500/80 backdrop-blur text-white flex items-center justify-center shadow-[0_0_20px_rgba(255,126,5,0.4)]">
                            <svg class="w-8 h-8 ml-1" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6V4z"></path></svg>
                        </div>
                    </div>
                </div>
                
            </div>

            <div class="w-full lg:w-[380px] bg-[#141414] flex flex-col text-sm shrink-0">
                <div class="p-4 flex flex-col gap-5 h-full">
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="text-white/90 font-semibold text-xs uppercase tracking-wider">Módulos Aprovados</h3>
                        </div>
                        <div id="render-queue-list" class="h-56 bg-[#0a0a0a] border border-white/5 rounded p-2 overflow-y-auto no-scrollbar flex flex-col gap-1"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS MÁGICOS -->
    <script>
        // CONFIGURAÇÕES DA API (Atualize o domínio Ngrok aqui se mudar)
        const API_BASE = "https://suave-unshackle-chug.ngrok-free.dev";
        const API_URL = `${API_BASE}/processar-video`;
        const API_STATUS_URL = `${API_BASE}/status`;
        let modulosGeradosPelaIA = []; 

        // ==========================================
        // CANVAS & BACKGROUND ANIMATION
        // ==========================================
        const canvas = document.getElementById('ai-aura-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [], mouseX = 0, mouseY = 0, isProcessing = false;

        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        resize();

        class Particle {
            constructor() { this.x = Math.random() * width; this.y = Math.random() * height; this.size = Math.random() * 1.5 + 0.5; this.speedX = Math.random() * 1 - 0.5; this.speedY = Math.random() * 1 - 0.5; this.color = Math.random() > 0.5 ? '#FF7E05' : '#ffc6a5'; }
            update() { if(isProcessing){ const dx = this.x - width/2, dy = this.y - height/2, angle = Math.atan2(dy, dx) + 0.08, dist = Math.sqrt(dx*dx + dy*dy) * 0.97; this.x = width/2 + Math.cos(angle) * dist; this.y = height/2 + Math.sin(angle) * dist; } else { this.x += this.speedX + (mouseX - width/2) * 0.002; this.y += this.speedY + (mouseY - height/2) * 0.002; } if (this.x < 0) this.x = width; if (this.x > width) this.x = 0; if (this.y < 0) this.y = height; if (this.y > height) this.y = 0; }
            draw() { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for(let i=0; i<150; i++) particles.push(new Particle());

        function animateBg() {
            ctx.fillStyle = 'rgba(8, 6, 5, 0.4)'; ctx.fillRect(0, 0, width, height);
            const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, isProcessing ? 400 : 250);
            grad.addColorStop(0, isProcessing ? 'rgba(255, 126, 5, 0.2)' : 'rgba(255, 126, 5, 0.05)');
            grad.addColorStop(1, 'transparent'); ctx.fillStyle = grad; ctx.fillRect(0,0,width,height);
            particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateBg);
        }
        animateBg();

        // ==========================================
        // ÁUDIO & TONE.JS
        // ==========================================
        let synthHover, synthClick, noiseProcess, audioInit = false;
        async function initAudio() {
            if(audioInit) return; await Tone.start();
            synthHover = new Tone.Synth({ oscillator: { type: "sine" }, envelope: { attack: 0.1, release: 0.1 } }).toDestination(); synthHover.volume.value = -30;
            synthClick = new Tone.MembraneSynth().toDestination(); synthClick.volume.value = -15;
            const filter = new Tone.AutoFilter(4).start();
            noiseProcess = new Tone.NoiseSynth({ noise: { type: 'pink' }, envelope: { attack: 1, sustain: 1, release: 1 } }).connect(filter).toDestination();
            noiseProcess.volume.value = -35; audioInit = true;
        }

        document.querySelectorAll('.meta-card, button').forEach(btn => {
            btn.addEventListener('mouseenter', () => { if(audioInit && !btn.classList.contains('disabled')) synthHover.triggerAttackRelease("C5", "32n"); });
            btn.addEventListener('mousedown', () => { if(audioInit && !btn.classList.contains('disabled')) { synthClick.triggerAttackRelease("E2", "16n"); } });
        });

        // ==========================================
        // SÍNTESE DE VOZ E AVATAR
        // ==========================================
        const synth = window.speechSynthesis;
        let feGilVoice = null, isSpeaking = false;
        function loadVoices() { feGilVoice = synth.getVoices().find(v => v.lang === 'pt-BR' && (v.name.includes('Google') || v.name.includes('Luciana'))) || synth.getVoices().find(v => v.lang.includes('pt')); }
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices; loadVoices(); 

        function animateAvatar() {
            const avatar = document.getElementById('fegil-avatar');
            if(isSpeaking) { avatar.style.transform = `scale(${1 + Math.random() * 0.03})`; avatar.style.opacity = `${0.85 + Math.random() * 0.15}`; requestAnimationFrame(animateAvatar);
            } else { avatar.style.transform = 'scale(1)'; avatar.style.opacity = '0.9'; }
        }

        function falar(texto, callback) {
            if(!synth) return; if (synth.speaking) synth.cancel();
            const elStatus = document.getElementById('ai-status-text');
            if (elStatus) { elStatus.style.opacity = 0; setTimeout(() => { elStatus.innerText = `"${texto}"`; elStatus.style.opacity = 1; }, 300); }
            const utter = new SpeechSynthesisUtterance(texto);
            if(feGilVoice) utter.voice = feGilVoice; utter.pitch = 1.0; utter.rate = 1.1;
            utter.onstart = () => { isSpeaking = true; animateAvatar(); };
            utter.onend = () => { isSpeaking = false; if(callback) callback(); }; utter.onerror = () => { isSpeaking = false; }; synth.speak(utter);
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast'); 
            toast.innerText = message; 
            toast.style.background = type === 'error' ? '#EF4444' : '#10B981';
            toast.style.bottom = '20px'; 
            setTimeout(() => { toast.style.bottom = '-50px'; }, type === 'error' ? 5000 : 3000);
        }

        // ==========================================
        // CONTROLES DE INTERFACE (LINK VS ARQUIVO)
        // ==========================================
        document.getElementById('btn-start').addEventListener('click', async () => {
            await initAudio(); falar("Sistema ativo.");
            const startScreen = document.getElementById('start-screen');
            startScreen.classList.add('opacity-0', 'scale-105');
            setTimeout(() => { startScreen.style.display = 'none'; document.getElementById('main-ui').classList.remove('opacity-0', 'pointer-events-none'); }, 700);
        });

        // Evento: Usuário colou um Link
        document.getElementById('input-link-video').addEventListener('input', function() {
            if(this.value.includes('http')) {
                document.getElementById('wrapper-cortes').classList.remove('disabled'); 
                document.getElementById('btn-cortes').disabled = false; 
                this.classList.add('success');
                // Limpa o arquivo se tiver
                document.getElementById('input-file-video').value = '';
                document.getElementById('file-name-display').innerText = 'Selecionar arquivo do PC';
            } else {
                this.classList.remove('success'); 
                if(!document.getElementById('input-file-video').files.length) {
                    document.getElementById('wrapper-cortes').classList.add('disabled');
                    document.getElementById('btn-cortes').disabled = true;
                }
            }
        });

        // Evento: Usuário selecionou um arquivo
        document.getElementById('input-file-video').addEventListener('change', function() {
            if(this.files.length > 0) {
                document.getElementById('file-name-display').innerText = this.files[0].name; 
                document.getElementById('wrapper-cortes').classList.remove('disabled'); 
                document.getElementById('btn-cortes').disabled = false;
                // Limpa o Link se tiver
                const linkInput = document.getElementById('input-link-video');
                linkInput.value = '';
                linkInput.classList.remove('success');
            } else {
                document.getElementById('file-name-display').innerText = 'Selecionar arquivo do PC';
                if(!document.getElementById('input-link-video').value.includes('http')) {
                    document.getElementById('wrapper-cortes').classList.add('disabled');
                    document.getElementById('btn-cortes').disabled = true;
                }
            }
        });

        // ==========================================
        // COMUNICAÇÃO COM O BACKEND (UPLOAD E POLLING)
        // ==========================================
        async function executarIA(tipo) {
            const linkVideo = document.getElementById('input-link-video').value.trim();
            const fileInput = document.getElementById('input-file-video');
            const videoFile = fileInput.files[0];

            if(!linkVideo && !videoFile) {
                showToast("Por favor, cole um link ou selecione um vídeo.", 'error');
                return;
            }

            isProcessing = true;
            if(audioInit) noiseProcess.triggerAttack();

            const overlayProcessing = document.getElementById('processing-overlay');
            overlayProcessing.style.display = 'flex';
            setTimeout(() => overlayProcessing.classList.remove('opacity-0'), 10);

            const bar = document.getElementById(`bar-${tipo}`); 
            bar.style.width = '5%'; document.getElementById('loading-percentage').innerText = '5%';

            falar(videoFile ? "Enviando arquivo do computador. Isso pode levar um instante." : "Enviando comando para o servidor processar.");

            try {
                // Envia Link OU Arquivo automaticamente
                let formData = new FormData();
                if (videoFile) formData.append("video_file", videoFile);
                else formData.append("link_video", linkVideo);

                await fetch(API_URL, {
                    method: 'POST', 
                    headers: { 'ngrok-skip-browser-warning': 'true' }, // Não usar Content-Type no FormData
                    body: formData
                });

                let errorCount = 0;
                const maxErrors = 6;

                let pollInterval = setInterval(async () => {
                    try {
                        const res = await fetch(API_STATUS_URL, { headers: { 'ngrok-skip-browser-warning': 'true' } });
                        if (!res.ok) throw new Error("Erro de conexão com o Ngrok.");
                        
                        const statusData = await res.json();
                        errorCount = 0; 
                        
                        // CAPTURA ERROS DO COLAB
                        if(statusData.erro) {
                            clearInterval(pollInterval);
                            let msgErro = statusData.erro.split('\n')[0]; 
                            throw new Error(msgErro);
                        }

                        document.getElementById('processing-subtitle').innerText = statusData.mensagem;
                        document.getElementById('loading-percentage').innerText = `${statusData.progresso}%`;
                        bar.style.width = `${statusData.progresso}%`;

                        // SUCESSO FINAL
                        if(statusData.progresso === 100) {
                            clearInterval(pollInterval);
                            isProcessing = false; 
                            modulosGeradosPelaIA = statusData.modulos;
                            
                            if(audioInit) { noiseProcess.triggerRelease(); const synthSuccess = new Tone.PolySynth(Tone.Synth).toDestination(); synthSuccess.volume.value = -8; synthSuccess.triggerAttackRelease(["C4", "E4", "G4", "C5"], "2n"); }
                            
                            overlayProcessing.classList.add('opacity-0');
                            setTimeout(() => overlayProcessing.style.display = 'none', 500);
                            
                            const qtd = modulosGeradosPelaIA.length;
                            document.getElementById('modules-detected').innerText = `${qtd} Módulo(s) Salvos`;
                            document.getElementById('modules-detected').classList.remove('hidden');

                            falar(`Tudo pronto! O vídeo foi processado com alta qualidade e os módulos salvos no Drive.`, () => {
                                bar.style.width = '0%';
                                const btnEditor = document.getElementById('btn-open-editor');
                                btnEditor.classList.remove('disabled'); btnEditor.disabled = false;
                                btnEditor.classList.add('bg-brand-500/20');
                            });
                        }
                    } catch (e) {
                        if (e.message !== "Erro de conexão com o Ngrok.") {
                            clearInterval(pollInterval);
                            throw e; 
                        }
                        errorCount++;
                        if (errorCount >= maxErrors) {
                            clearInterval(pollInterval);
                            throw new Error("O servidor demorou muito para responder ou caiu.");
                        }
                    }
                }, 2000);

            } catch (error) {
                isProcessing = false; bar.style.width = '0%'; if(audioInit) noiseProcess.triggerRelease();
                overlayProcessing.classList.add('opacity-0'); setTimeout(() => overlayProcessing.style.display = 'none', 300);
                
                const mensagemReal = error.message.replace("Exception: ", "");
                falar("Atenção, o processo foi interrompido.");
                showToast(`Erro do Servidor: ${mensagemReal}`, 'error');
                console.error("LOG DO SISTEMA:", error);
            }
        }

        // ==========================================
        // ESTÚDIO E PLAYER DE VÍDEO
        // ==========================================
        const workspace = document.getElementById('editor-workspace');
        
        function abrirEditor() {
            if(audioInit) { const synthOpen = new Tone.FMSynth().toDestination(); synthOpen.volume.value = -12; synthOpen.triggerAttackRelease("A3", "8n"); }
            workspace.classList.remove('hidden'); setTimeout(() => workspace.classList.remove('opacity-0'), 50);

            const queueList = document.getElementById('render-queue-list'); 
            queueList.innerHTML = '';
            
            if(modulosGeradosPelaIA && modulosGeradosPelaIA.length > 0) {
                modulosGeradosPelaIA.forEach((mod, index) => {
                    queueList.innerHTML += `
                        <div onclick="carregarVideoNoPlayer('${mod.url_video}')" class="flex flex-col bg-white/5 p-3 rounded group border border-white/5 cursor-pointer hover:bg-brand-500/20 transition-colors">
                            <span class="text-[11px] text-brand-400 font-bold uppercase mb-1">${mod.modulo}</span>
                            <div class="flex items-center justify-between">
                                <span class="text-[10px] text-white/60 font-mono truncate mr-2">${mod.arquivo}</span>
                                <span class="text-[9px] bg-brand-500/20 text-brand-400 px-2 py-0.5 rounded border border-brand-500/30 shrink-0 flex items-center gap-1 font-bold">▶ PLAY</span>
                            </div>
                        </div>`;
                        
                    // Auto-carrega o primeiro vídeo
                    if(index === 0) carregarVideoNoPlayer(mod.url_video);
                });
            }
        }
        
        function fecharEditor() { 
            workspace.classList.add('opacity-0'); 
            setTimeout(() => workspace.classList.add('hidden'), 500);
            const videoPlayer = document.getElementById('main-video-player');
            if(videoPlayer) videoPlayer.pause();
        }

        function carregarVideoNoPlayer(urlVideo) {
            if (!urlVideo || urlVideo === 'undefined') return;

            const videoPlayer = document.getElementById('main-video-player');
            const placeholder = document.getElementById('placeholder-video');
            const playOverlay = document.getElementById('play-overlay');

            placeholder.style.display = 'none';
            playOverlay.style.display = 'none';
            
            videoPlayer.style.display = 'block';
            videoPlayer.src = urlVideo;
            videoPlayer.controls = true; 
            
            videoPlayer.play().catch(e => console.log("Autoplay bloqueado pelo navegador", e));
        }
    </script>
</body>
</html>
